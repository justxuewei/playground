<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kernel 1 Naive SGEMM</title>
  <link rel="stylesheet" href="kernel_animation.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Kernel 1: Naive SGEMM</h1>
        <p class="subtitle">
          Follow one CUDA block from C tile selection to one thread computing
          one C element. The final step shows why the naive warp mapping is
          inefficient.
        </p>
      </div>
      <div class="controls" aria-label="Animation controls">
        <button id="prev" type="button">Prev</button>
        <button id="play" type="button">Play</button>
        <button id="next" type="button">Next</button>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>

    <nav class="stage-tabs" aria-label="Animation stages" id="tabs"></nav>

    <section class="canvas-shell" aria-label="Kernel 1 naive SGEMM animation">
      <canvas id="scene" width="1200" height="680"></canvas>
      <div class="legend" aria-label="Legend">
        <span class="legend-item"><span class="swatch c"></span>C tile</span>
        <span class="legend-item"><span class="swatch warp"></span>Warp 0</span>
        <span class="legend-item"><span class="swatch a"></span>A access</span>
        <span class="legend-item"><span class="swatch b"></span>B access</span>
        <span class="legend-item"><span class="swatch memo"></span>Register sum</span>
      </div>
    </section>
  </main>

  <script src="kernel1_naive.js"></script>
</body>
</html>
