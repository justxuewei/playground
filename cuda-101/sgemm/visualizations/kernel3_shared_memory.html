<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kernel 3 Shared Memory Blocking</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #1d2433;
      --muted: #5b6475;
      --line: #d8dde8;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #118a4b;
      --green-soft: #dcfce7;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --rose: #be123c;
      --rose-soft: #ffe4e6;
      --slate-soft: #eef2f7;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1220px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      min-width: 74px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9aa7bb;
      background: #f9fafc;
    }

    button:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .stage-tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }

    .stage-tabs button {
      min-width: 0;
      padding: 7px 6px;
      font-size: 12px;
      line-height: 1.2;
      white-space: normal;
    }

    .stage-tabs button.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #123a86;
    }

    .canvas-shell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(29, 36, 51, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1200 / 680;
      background: var(--panel);
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      gap: 14px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(29, 36, 51, 0.16);
      flex: 0 0 auto;
    }

    .swatch.a {
      background: var(--blue-soft);
    }

    .swatch.b {
      background: var(--amber-soft);
    }

    .swatch.c {
      background: var(--green-soft);
    }

    .swatch.thread {
      background: var(--rose-soft);
    }

    @media (max-width: 820px) {
      main {
        width: min(100vw - 18px, 1220px);
        padding-top: 12px;
      }

      header {
        display: block;
      }

      .controls {
        justify-content: flex-start;
        margin-top: 10px;
      }

      .stage-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      canvas {
        aspect-ratio: 1200 / 760;
      }

      .legend {
        grid-template-columns: repeat(2, minmax(0, max-content));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Kernel 3: Shared Memory Blocking</h1>
        <p class="subtitle">
          Walks from the CUDA code, to the first block, to one shared-memory
          tile, and finally to the full matrix grid.
        </p>
      </div>
      <div class="controls" aria-label="Animation controls">
        <button id="prev" type="button">Prev</button>
        <button id="play" type="button">Play</button>
        <button id="next" type="button">Next</button>
        <button id="reset" type="button">Reset</button>
      </div>
    </header>

    <nav class="stage-tabs" aria-label="Animation stages" id="tabs"></nav>

    <section class="canvas-shell" aria-label="Kernel 3 shared memory animation">
      <canvas id="scene" width="1200" height="680"></canvas>
      <div class="legend" aria-label="Legend">
        <span class="legend-item"><span class="swatch a"></span>A tile</span>
        <span class="legend-item"><span class="swatch b"></span>B tile</span>
        <span class="legend-item"><span class="swatch c"></span>C tile</span>
        <span class="legend-item"><span class="swatch thread"></span>Active thread</span>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#scene");
    const ctx = canvas.getContext("2d");
    const tabs = document.querySelector("#tabs");
    const playButton = document.querySelector("#play");

    const W = 1200;
    const H = 680;
    const BLOCK = 32;
    const selectedBlock = { x: 0, y: 0 };
    const codeHotspots = [];
    let selectedCodeStep = null;

    const stages = [
      {
        title: "Code walkthrough",
        note: "Read the shared-memory kernel in execution order: block index, shared tiles, load, sync, compute, and writeback."
      },
      {
        title: "Block setup",
        note: "Start with blockIdx = (0, 0): one block owns the first 32x32 C tile and its own As/Bs."
      },
      {
        title: "Tile work",
        note: "The block loads A[32x32] and B[32x32] into shared memory for the current K chunk."
      },
      {
        title: "Sync",
        note: "All threads wait until shared memory is complete."
      },
      {
        title: "Dot product",
        note: "Each thread multiplies one As row by one Bs column."
      },
      {
        title: "Next K",
        note: "Pointers advance to the next 32-wide K chunk."
      },
      {
        title: "Matrix grid",
        note: "The grid repeats that same shared-memory block program across the full C matrix."
      },
      {
        title: "Why faster",
        note: "Kernel 3 is faster because each A/B tile is loaded once into shared memory and reused by the whole block."
      }
    ];

    let stageIndex = 0;
    let playing = false;
    let stageStartedAt = performance.now();
    const stageMs = 2300;

    for (const [index, stage] of stages.entries()) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = `${index + 1}. ${stage.title}`;
      button.addEventListener("click", () => setStage(index));
      tabs.appendChild(button);
    }

    document.querySelector("#prev").addEventListener("click", () => {
      setStage((stageIndex + stages.length - 1) % stages.length);
    });

    document.querySelector("#next").addEventListener("click", () => {
      setStage((stageIndex + 1) % stages.length);
    });

    document.querySelector("#reset").addEventListener("click", () => {
      playing = false;
      playButton.textContent = "Play";
      setStage(0);
    });

    playButton.addEventListener("click", () => {
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
      stageStartedAt = performance.now();
    });

    canvas.addEventListener("click", (event) => {
      const hit = codeHotspotAt(event);
      if (hit === null) return;
      selectedCodeStep = hit;
      playing = false;
      playButton.textContent = "Play";
      draw();
    });

    canvas.addEventListener("mousemove", (event) => {
      canvas.style.cursor = codeHotspotAt(event) === null ? "default" : "pointer";
    });

    function setStage(index) {
      stageIndex = index;
      selectedCodeStep = null;
      stageStartedAt = performance.now();
      updateTabs();
      draw();
    }

    function updateTabs() {
      for (const [index, button] of [...tabs.children].entries()) {
        button.classList.toggle("active", index === stageIndex);
      }
    }

    function tick(now) {
      if (playing && now - stageStartedAt > stageMs) {
        setStage((stageIndex + 1) % stages.length);
      }
      draw(now);
      requestAnimationFrame(tick);
    }

    function setupCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      ctx.setTransform(
        (canvas.width / W),
        0,
        0,
        (canvas.height / H),
        0,
        0
      );
    }

    window.addEventListener("resize", () => {
      setupCanvas();
      draw();
    });

    function draw(now = performance.now()) {
      const progress = Math.min(1, (now - stageStartedAt) / stageMs);
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawStageHeader();

      if (stageIndex === 0) drawCodeWalkthroughStage(progress);
      if (stageIndex === 1) drawBlockSetupStage(progress);
      if (stageIndex === 2) drawLoadStage(progress, 0);
      if (stageIndex === 3) drawSyncStage(progress);
      if (stageIndex === 4) drawDotStage(progress);
      if (stageIndex === 5) drawLoadStage(progress, 1);
      if (stageIndex === 6) drawMatrixGridStage(progress);
      if (stageIndex === 7) drawWhyFasterStage(progress);
    }

    function drawBackground() {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "#e3e8f2";
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y <= H; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
    }

    function drawStageHeader() {
      const stage = stages[stageIndex];
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 22px ui-sans-serif, system-ui";
      ctx.fillText(`${stageIndex + 1}. ${stage.title}`, 28, 38);
      ctx.fillStyle = "#5b6475";
      ctx.font = "14px ui-sans-serif, system-ui";
      ctx.fillText(stage.note, 28, 62);
      drawCodeLine(785, 28, stageIndex);
    }

    function drawCodeLine(x, y, index) {
      const lines = [
        "sgemm_shared_mem_block<32><<<gridDim, 1024>>>(...)",
        "blockIdx = (0, 0) owns C[0..31][0..31];",
        "As[...] = A[...]; Bs[...] = B[...];",
        "__syncthreads();",
        "tmp += As[threadRow][dotIdx] * Bs[dotIdx][threadCol];",
        "A += 32; B += 32 * N;",
        "shared tiles replace repeated global reads;",
        "gridDim repeats shared-memory tiles over C;"
      ];
      roundRect(x, y - 19, 380, 40, 6, "#f4f7fb", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText(lines[index], x + 12, y + 5);
    }

    function drawCodeWalkthroughStage(progress) {
      const codeX = 58;
      const codeY = 104;
      codeHotspots.length = 0;
      const active = selectedCodeStep ?? Math.min(6, Math.floor(progress * 7));
      const codeLines = [
        "const uint cTileRow = blockIdx.x;",
        "const uint cTileCol = blockIdx.y;",
        "__shared__ float As[BLOCKSIZE * BLOCKSIZE];",
        "__shared__ float Bs[BLOCKSIZE * BLOCKSIZE];",
        "threadCol = threadIdx.x % BLOCKSIZE;",
        "threadRow = threadIdx.x / BLOCKSIZE;",
        "for (int bkIdx = 0; bkIdx < K; bkIdx += BLOCKSIZE) {",
        "  As[...] = A[...]; Bs[...] = B[...];",
        "  __syncthreads();",
        "  for (int dotIdx = 0; dotIdx < BLOCKSIZE; ++dotIdx) {",
        "    tmp += As[threadRow][dotIdx] * Bs[dotIdx][threadCol];",
        "  }",
        "  __syncthreads();",
        "}",
        "C[...] = alpha * tmp + beta * C[...];"
      ];

      roundRect(codeX - 18, codeY - 34, 680, 474, 8, "#ffffff", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 16px ui-sans-serif, system-ui";
      ctx.fillText("Kernel execution order", codeX, codeY - 10);

      for (let i = 0; i < codeLines.length; i += 1) {
        const group = sharedCodeGroupForLine(i);
        const isActive = group === active;
        codeHotspots.push({
          x: codeX - 8,
          y: codeY + i * 26 + 4,
          w: 645,
          h: 23,
          step: group
        });
        if (isActive) {
          roundRect(codeX - 8, codeY + i * 26 + 4, 645, 23, 5, "#e8f7ef", "#118a4b");
        }
        ctx.fillStyle = isActive ? "#14532d" : "#1d2433";
        ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, monospace";
        ctx.fillText(codeLines[i], codeX, codeY + i * 26 + 21);
      }

      const steps = [
        ["Block index", "blockIdx chooses one 32x32 C tile."],
        ["Shared tiles", "As and Bs are private to this block."],
        ["Thread mapping", "1024 threads map to 32 rows x 32 cols."],
        ["Load chunk", "Each thread copies one A and one B value."],
        ["Sync", "All threads wait before reading As/Bs."],
        ["Compute", "Threads reuse shared memory for the dot product."],
        ["Write C", "Each thread writes one C element."]
      ];
      const cardX = 785;
      const cardY = 108;
      for (let i = 0; i < steps.length; i += 1) {
        const y = cardY + i * 68;
        const isActive = i === active;
        roundRect(cardX, y, 346, 52, 7, isActive ? "#fef3c7" : "#ffffff", isActive ? "#b45309" : "#d8dde8");
        ctx.fillStyle = isActive ? "#78350f" : "#1d2433";
        ctx.font = "700 13px ui-sans-serif, system-ui";
        ctx.fillText(`${i + 1}. ${steps[i][0]}`, cardX + 12, y + 20);
        ctx.fillStyle = "#5b6475";
        ctx.font = "12px ui-sans-serif, system-ui";
        ctx.fillText(steps[i][1], cardX + 12, y + 38);
      }
    }

    function sharedCodeGroupForLine(line) {
      if (line <= 1) return 0;
      if (line <= 3) return 1;
      if (line <= 5) return 2;
      if (line <= 7) return 3;
      if (line === 8 || line === 12) return 4;
      if (line <= 13) return 5;
      return 6;
    }

    function codeHotspotAt(event) {
      if (stageIndex !== 0) return null;
      const rect = canvas.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * W;
      const y = ((event.clientY - rect.top) / rect.height) * H;
      const hit = codeHotspots.find((spot) =>
        x >= spot.x && x <= spot.x + spot.w && y >= spot.y && y <= spot.y + spot.h
      );
      return hit ? hit.step : null;
    }

    function drawBlockSetupStage(progress) {
      drawGlobalMemoryBand(74, 105);
      drawBlockSharedMemory(72, 250, "block (0, 0)", true, progress);
      drawBlockSharedMemory(418, 250, "block (1, 0)", false, progress);
      drawBlockSharedMemory(764, 250, "block (0, 1)", false, progress);

      drawCallout(80, 520, [
        "Start with the first block:",
        "",
        "blockIdx = (0, 0)",
        "C rows 0..31, C cols 0..31",
        "",
        "This block gets its own private As and Bs."
      ]);
      drawCallout(620, 520, [
        "Inside one block, different threadIdx values",
        "cooperate through that block's As and Bs.",
        "",
        "The same threadIdx in another block uses a",
        "different As and Bs allocation."
      ]);
    }

    function drawGlobalMemoryBand(x, y) {
      roundRect(x, y, 1015, 86, 8, "#f8fafc", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 16px ui-sans-serif, system-ui";
      ctx.fillText("Global memory", x + 18, y + 27);
      ctx.fillStyle = "#5b6475";
      ctx.font = "13px ui-sans-serif, system-ui";
      ctx.fillText("A, B, and C live here. All blocks can read/write global memory.", x + 18, y + 54);

      drawMiniGlobalTile(x + 650, y + 18, "A", "#dbeafe", "#2563eb");
      drawMiniGlobalTile(x + 740, y + 18, "B", "#fef3c7", "#b45309");
      drawMiniGlobalTile(x + 830, y + 18, "C", "#dcfce7", "#118a4b");
    }

    function drawMiniGlobalTile(x, y, label, fill, stroke) {
      roundRect(x, y, 70, 48, 6, fill, stroke);
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 16px ui-sans-serif, system-ui";
      ctx.fillText(label, x + 28, y + 30);
    }

    function drawBlockSharedMemory(x, y, title, selected, progress) {
      const border = selected ? "#118a4b" : "#9aa7bb";
      const fill = selected ? "#f0fdf4" : "#ffffff";
      roundRect(x, y, 315, 218, 8, fill, border);
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 15px ui-sans-serif, system-ui";
      ctx.fillText(title, x + 16, y + 27);
      ctx.fillStyle = "#5b6475";
      ctx.font = "12px ui-sans-serif, system-ui";
      ctx.fillText("private shared memory for this block", x + 16, y + 48);

      const pulse = selected ? 0.18 + 0.08 * Math.sin(progress * Math.PI * 2) : 0.08;
      drawSharedBox(x + 18, y + 72, "As", "#dbeafe", "#2563eb", pulse);
      drawSharedBox(x + 164, y + 72, "Bs", "#fef3c7", "#b45309", pulse);

      drawThreadDots(x + 28, y + 160, selected, progress);
      ctx.fillStyle = selected ? "#118a4b" : "#5b6475";
      ctx.font = "12px ui-sans-serif, system-ui";
      ctx.fillText(
        selected ? "threads in this block share this As/Bs" : "separate As/Bs",
        x + 18,
        y + 210
      );
    }

    function drawSharedBox(x, y, label, fill, stroke, pulse) {
      roundRect(x, y, 128, 70, 6, fill, stroke);
      ctx.fillStyle = stroke;
      ctx.globalAlpha = pulse;
      ctx.fillRect(x + 8, y + 34, 112, 22);
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 18px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText(label, x + 48, y + 28);
      ctx.font = "11px ui-sans-serif, system-ui";
      ctx.fillText("32x32 floats", x + 34, y + 56);
    }

    function drawThreadDots(x, y, selected, progress) {
      const pulse = selected ? 0.6 + 0.25 * Math.sin(progress * Math.PI * 2) : 0.45;
      ctx.fillStyle = selected ? `rgba(17, 138, 75, ${pulse})` : "rgba(91, 100, 117, 0.45)";
      for (let i = 0; i < 16; i += 1) {
        const px = x + (i % 8) * 28;
        const py = y + Math.floor(i / 8) * 18;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = selected ? "#118a4b" : "#5b6475";
      ctx.font = "11px ui-sans-serif, system-ui";
      ctx.fillText("many threadIdx values", x + 4, y + 33);
    }

    function drawLoadStage(progress, chunk) {
      const kStart = chunk * BLOCK;
      drawGlobalPair(kStart);
      drawSharedPair(440, 360, progress);

      const t = ease(progress);
      drawArrow(310, 242, 480, 382, "#2563eb", t);
      drawArrow(870, 242, 700, 382, "#b45309", t);

      drawCallout(420, 92, [
        chunk === 0 ? "First K chunk" : "Next K chunk",
        `A tile: rows 0..31, cols ${kStart}..${kStart + 31}`,
        `B tile: rows ${kStart}..${kStart + 31}, cols 0..31`,
        "",
        "Each thread copies one A element and one B element."
      ]);
    }

    function drawSyncStage(progress) {
      drawSharedPair(260, 140, 1);
      drawBarrier(680, 170, progress);
      drawCallout(710, 250, [
        "__syncthreads() is a block-level barrier.",
        "",
        "No thread reads As or Bs until all 1024",
        "loads into shared memory are complete.",
        "",
        "The second barrier prevents early overwrite",
        "before the next K chunk is loaded."
      ]);
    }

    function drawDotStage(progress) {
      drawSharedPair(170, 145, 1);
      drawLocalTile(780, 145, 250, 250, {
        row: 0,
        col: 0,
        fill: "#dcfce7",
        stroke: "#118a4b"
      });

      const dot = Math.floor(progress * 31);
      drawSharedHighlights(170, 145, dot);
      drawArrow(505, 260, 780, 260, "#118a4b", 1);
      drawCallout(735, 440, [
        "Example thread:",
        "  threadIdx.x = 0",
        "  threadRow = 0",
        "  threadCol = 0",
        "",
        "It computes C[0][0]."
      ]);
      drawFormula(58, 520, `dotIdx = ${dot}: tmp += As[0][${dot}] * Bs[${dot}][0]`);
    }

    function drawMatrixGridStage(progress) {
      drawSharedPair(95, 130, 1);
      drawMatrixTiles("C matrix", 720, 128, 330, 330, 4, 4, {
        row: selectedBlock.x,
        col: selectedBlock.y,
        fill: "#dcfce7",
        stroke: "#118a4b"
      });
      drawArrow(505, 285, 720, 285, "#118a4b", ease(progress));
      drawCallout(650, 500, [
        "Matrix view:",
        "",
        "The first block writes C[0..31][0..31].",
        "The grid repeats the same shared-memory",
        "program for every other 32x32 C tile."
      ]);
      pulseRect(720, 128, 82.5, 82.5, "#118a4b", progress);
    }

    function drawWhyFasterStage(progress) {
      drawComparisonPanel(70, 118, "Kernel 2", [
        "A/B read from global",
        "each thread loops over K",
        "neighbor threads repeat A/B reads",
        "no block-level cache",
        "more global memory traffic"
      ], "#fff7ed", "#be123c");
      drawComparisonPanel(440, 118, "Kernel 3", [
        "load A/B tiles once",
        "As: 32x32 shared",
        "Bs: 32x32 shared",
        "1024 threads reuse tiles",
        "less global memory traffic"
      ], "#e8f7ef", "#118a4b");
      drawArrow(380, 276, 430, 276, "#118a4b", ease(progress));

      roundRect(815, 128, 310, 302, 8, "#ffffff", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 16px ui-sans-serif, system-ui";
      ctx.fillText("Why faster", 835, 160);
      ctx.fillStyle = "#5b6475";
      ctx.font = "13px ui-sans-serif, system-ui";
      ctx.fillText("Kernel 3 still computes one C", 835, 200);
      ctx.fillText("element per thread, like kernel 2.", 835, 221);
      ctx.fillText("The speedup comes from moving", 835, 263);
      ctx.fillText("a 32-wide K chunk into shared", 835, 284);
      ctx.fillText("memory before the dot-product loop.", 835, 305);

      drawFormula(265, 560, "Kernel 3: global A/B tile -> shared As/Bs once -> reused by 1024 threads");
    }

    function drawComparisonPanel(x, y, title, lines, fill, stroke) {
      roundRect(x, y, 310, 360, 8, fill, stroke);
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 18px ui-sans-serif, system-ui";
      ctx.fillText(title, x + 18, y + 34);
      for (let i = 0; i < lines.length; i += 1) {
        roundRect(x + 18, y + 68 + i * 52, 274, 36, 6, "#ffffff", "#d8dde8");
        ctx.fillStyle = i === lines.length - 1 ? stroke : "#1d2433";
        ctx.font = i === lines.length - 1
          ? "700 13px ui-sans-serif, system-ui"
          : "13px ui-sans-serif, system-ui";
        ctx.fillText(lines[i], x + 30, y + 91 + i * 52);
      }
    }

    function drawGlobalPair(kStart) {
      drawMatrixTiles("A global", 65, 118, 245, 245, 4, 4, {
        row: selectedBlock.x,
        col: kStart / 32,
        fill: "#dbeafe",
        stroke: "#2563eb"
      });
      drawMatrixTiles("B global", 890, 118, 245, 245, 4, 4, {
        row: kStart / 32,
        col: selectedBlock.y,
        fill: "#fef3c7",
        stroke: "#b45309"
      });
    }

    function drawSharedPair(x, y, progress) {
      const alpha = 0.28 + 0.72 * ease(progress);
      ctx.globalAlpha = alpha;
      drawDenseTile("As shared", x, y, 170, "#dbeafe", "#2563eb");
      drawDenseTile("Bs shared", x + 220, y, 170, "#fef3c7", "#b45309");
      ctx.globalAlpha = 1;
    }

    function drawSharedHighlights(x, y, dot) {
      const size = 170;
      const cell = size / 8;
      roundRect(x, y, size, size, 6, "transparent", "#2563eb");
      ctx.fillStyle = "rgba(37, 99, 235, 0.18)";
      ctx.fillRect(x, y, size, cell);
      ctx.fillStyle = "rgba(190, 18, 60, 0.28)";
      ctx.fillRect(x + (dot % 8) * cell, y, cell, cell);

      const bx = x + 220;
      roundRect(bx, y, size, size, 6, "transparent", "#b45309");
      ctx.fillStyle = "rgba(180, 83, 9, 0.18)";
      ctx.fillRect(bx, y, cell, size);
      ctx.fillStyle = "rgba(190, 18, 60, 0.28)";
      ctx.fillRect(bx, y + (dot % 8) * cell, cell, cell);
    }

    function drawMatrixTiles(title, x, y, w, h, rows, cols, highlight) {
      roundRect(x - 12, y - 38, w + 24, h + 58, 8, "#ffffff", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 15px ui-sans-serif, system-ui";
      ctx.fillText(title, x, y - 14);

      const cellW = w / cols;
      const cellH = h / rows;
      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const isHit = highlight && highlight.row === row && highlight.col === col;
          ctx.fillStyle = isHit ? highlight.fill : "#f8fafc";
          ctx.strokeStyle = isHit ? highlight.stroke : "#d8dde8";
          ctx.lineWidth = isHit ? 3 : 1;
          ctx.fillRect(x + col * cellW, y + row * cellH, cellW, cellH);
          ctx.strokeRect(x + col * cellW, y + row * cellH, cellW, cellH);
        }
      }
      ctx.fillStyle = "#5b6475";
      ctx.font = "12px ui-sans-serif, system-ui";
      ctx.fillText("Each visible cell represents one 32x32 tile.", x, y + h + 20);
    }

    function drawLocalTile(x, y, size, highlight) {
      drawDenseTile("Local 32x32 C tile", x, y, size, "#f8fafc", "#9aa7bb");
      const cell = size / 8;
      if (highlight.row !== undefined) {
        ctx.fillStyle = highlight.fill;
        ctx.fillRect(x, y + highlight.row * cell, size, cell);
        ctx.strokeStyle = highlight.stroke;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y + highlight.row * cell, size, cell);
      }
      if (highlight.col !== undefined) {
        ctx.fillStyle = "rgba(17, 138, 75, 0.16)";
        ctx.fillRect(x + highlight.col * cell, y, cell, size);
      }
    }

    function drawDenseTile(title, x, y, size, fill, stroke) {
      roundRect(x - 10, y - 34, size + 20, size + 52, 8, "#ffffff", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "700 14px ui-sans-serif, system-ui";
      ctx.fillText(title, x, y - 12);
      const cells = 8;
      const cell = size / cells;
      for (let row = 0; row < cells; row += 1) {
        for (let col = 0; col < cells; col += 1) {
          ctx.fillStyle = fill;
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 0.8;
          ctx.fillRect(x + col * cell, y + row * cell, cell, cell);
          ctx.strokeRect(x + col * cell, y + row * cell, cell, cell);
        }
      }
      ctx.fillStyle = "#5b6475";
      ctx.font = "11px ui-sans-serif, system-ui";
      ctx.fillText("drawn as 8x8 groups", x, y + size + 17);
    }

    function drawCallout(x, y, lines) {
      const lineHeight = 20;
      const width = Math.max(...lines.map((line) => measure(line))) + 28;
      const height = lines.length * lineHeight + 22;
      roundRect(x, y, width, height, 8, "#f9fbff", "#d8dde8");
      ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, monospace";
      for (let i = 0; i < lines.length; i += 1) {
        ctx.fillStyle = lines[i] === "" ? "transparent" : "#1d2433";
        ctx.fillText(lines[i], x + 14, y + 24 + i * lineHeight);
      }
    }

    function drawFormula(x, y, text) {
      roundRect(x, y, 540, 46, 8, "#eef2f7", "#d8dde8");
      ctx.fillStyle = "#1d2433";
      ctx.font = "15px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText(text, x + 16, y + 29);
    }

    function drawBarrier(x, y, progress) {
      roundRect(x, y, 340, 58, 8, "#ffe4e6", "#be123c");
      ctx.fillStyle = "#be123c";
      ctx.font = "700 18px ui-monospace, SFMono-Regular, Menlo, monospace";
      ctx.fillText("__syncthreads()", x + 86, y + 36);

      const dots = Math.floor(progress * 18);
      ctx.fillStyle = "#be123c";
      for (let i = 0; i < dots; i += 1) {
        ctx.beginPath();
        ctx.arc(x + 20 + i * 17, y + 82, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawArrow(x1, y1, x2, y2, color, progress) {
      const x = x1 + (x2 - x1) * progress;
      const y = y1 + (y2 - y1) * progress;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x, y);
      ctx.stroke();
      if (progress > 0.12) {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - 12 * Math.cos(angle - 0.5), y - 12 * Math.sin(angle - 0.5));
        ctx.lineTo(x - 12 * Math.cos(angle + 0.5), y - 12 * Math.sin(angle + 0.5));
        ctx.closePath();
        ctx.fill();
      }
    }

    function pulseRect(x, y, w, h, color, progress) {
      const alpha = 0.18 + 0.18 * Math.sin(progress * Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = colorWithAlpha(color, alpha);
      ctx.fillRect(x, y, w, h);
    }

    function roundRect(x, y, w, h, radius, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      if (fill !== "transparent") {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function measure(text) {
      ctx.save();
      ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, monospace";
      const width = ctx.measureText(text).width;
      ctx.restore();
      return width;
    }

    function ease(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function colorWithAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    setupCanvas();
    updateTabs();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
